<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eagle Mind Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; margin: 0; padding: 0; }
        .header-yellow { background: linear-gradient(135deg, #FFD200 0%, #F5C300 100%); }
        .btn-black { background-color: #000000; color: #FFD200; border-radius: 1rem; transition: all 0.2s; }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .nav-fixed { position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-top: 1px solid #E2E8F0; z-index: 100; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let state = { user: null, view: 'dashboard', loading: true };

        function render() {
            const root = document.getElementById('app');
            if (state.loading) { root.innerHTML = `<div class="h-screen flex items-center justify-center font-bold text-slate-400">Iniciando...</div>`; return; }
            if (!state.user) { renderLogin(root); return; }
            renderApp(root);
        }

        function renderLogin(root) {
            root.innerHTML = `<div class="h-screen bg-white p-8 flex flex-col justify-center text-center">
                <div class="w-20 h-20 header-yellow rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-lg"><i class="fas fa-eagle text-3xl"></i></div>
                <h1 class="text-3xl font-extrabold mb-8">Eagle Mind</h1>
                <div class="space-y-4">
                    <input id="email" type="email" placeholder="Correo" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border" />
                    <input id="pass" type="password" placeholder="Contraseña" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border" />
                    <button id="doLogin" class="w-full btn-black font-bold py-4">Entrar</button>
                </div>
            </div>`;
            document.getElementById('doLogin').onclick = async () => {
                try { await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value); } 
                catch (err) { alert("Error al entrar"); }
            };
        }

        function renderApp(root) {
            root.innerHTML = `
                <div class="min-h-screen pb-24">
                    <header class="header-yellow pt-14 pb-8 px-6 rounded-b-[2.5rem] flex justify-between items-center">
                        <h2 class="font-extrabold text-lg">${state.user.email.split('@')[0]}</h2>
                        <button id="logout" class="w-10 h-10 bg-black/10 rounded-xl"><i class="fas fa-sign-out-alt"></i></button>
                    </header>
                    <main class="p-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="card p-6 text-center border border-slate-50">
                                <i class="fas fa-users text-rose-500 mb-2"></i><p class="text-xs font-bold">CLIENTES</p>
                            </div>
                            <div class="card p-6 text-center border border-slate-50">
                                <i class="fas fa-boxes-stacked text-blue-500 mb-2"></i><p class="text-xs font-bold">STOCK</p>
                            </div>
                        </div>
                    </main>
                    <nav class="nav-fixed flex justify-around items-center">
                        <i class="fas fa-house text-xl text-black"></i>
                        <i class="fas fa-users text-xl text-slate-300"></i>
                        <i class="fas fa-box text-xl text-slate-300"></i>
                    </nav>
                </div>
            `;
            document.getElementById('logout').onclick = () => signOut(auth);
        }

        onAuthStateChanged(auth, (u) => { state.user = u; state.loading = false; render(); });
    </script>
</body>
</html>
