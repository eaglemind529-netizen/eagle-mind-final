        const firebaseConfig = {

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = "eagle-mind-final";
        const ADMIN_EMAIL = "eaglemind529@gmail.com";

        let state = {
            user: null, userData: null, loading: true,
            items: [], sales: [], clients: [], expenses: [],
            allUsers: [], notifications: [],
            activeModal: null, carouselIndex: 0,
            editingClientId: null, payingClientId: null,
            editingSaleId: null, isSyncing: false
        };

        let unsubscribes = [];

        function render() {
            const root = document.getElementById('app');
            if (!root) return;

            if (state.loading) {
                root.innerHTML = `<div class="h-screen flex items-center justify-center bg-white"><div class="flex flex-col items-center"><div class="animate-spin rounded-full h-12 w-12 border-t-4 border-yellow-500 mb-4"></div><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Cargando...</p></div></div>`;

            if (!state.user) { 
                renderLogin(root); 
                return;

            const isAdm = state.user.email.toLowerCase() === ADMIN_EMAIL;
            
            if (state.userData && !state.userData.approved && !isAdm) {
                root.innerHTML = `<div class="h-screen flex flex-col items-center justify-center px-10 text-center bg-white"><div class="w-24 h-24 bg-amber-50 rounded-full flex items-center justify-center mb-8"><i class="fas fa-lock text-amber-500 text-4xl"></i></div><h2 class="text-3xl font-black mb-4 uppercase tracking-tighter">Acceso Pendiente</h2><p class="text-slate-400 text-base leading-relaxed">Tu cuenta <b>${state.user.email}</b> espera aprobación.</p><button onclick="window.logout()" class="btn-yellow mt-10">Cerrar Sesión</button></div>`;
                return;
            }

            const caja = calcularCaja();
            const deudas = calcularDeudas();
            const gastos = calcularGastos();
            const ganancias = calcularGanancias();
            const vTotales = calcularVentasTotales();

            root.innerHTML = `
            <div class="pb-36">
                <header class="header-gradient pt-16 pb-12 px-8 flex justify-between items-end relative">
                    <div><h2 class="text-black font-black text-3xl uppercase tracking-tighter">EXITO</h2><p class="text-black/50 text-[11px] font-bold tracking-widest uppercase mt-2">Gestión Privada</p></div>
                    <div class="flex gap-3">
                        <button onclick="window.setModal('avisos')" class="w-14 h-14 bg-black/10 rounded-2xl flex items-center justify-center relative">
                            <i class="fas fa-bell text-black text-lg"></i>
                            ${state.notifications.length > 0 ? '<div class="notif-badge"></div>' : ''}
                        </button>
                        <button onclick="window.logout()" class="w-14 h-14 bg-black rounded-2xl flex items-center justify-center shadow-lg"><i class="fas fa-power-off text-white text-lg"></i></button>
                    </div>
                </header>
                <div class="px-6 -mt-10 flex flex-col gap-4">
                    <div class="bg-black rounded-[35px] p-8 shadow-2xl flex justify-between items-center text-white relative overflow-hidden">
                        <div class="relative z-10"><p class="text-white/40 text-[11px] font-bold uppercase tracking-widest">En Caja (Efectivo)</p><h3 class="text-white text-3xl font-black mt-2 tracking-tighter">$ ${caja}</h3></div>
                        <div class="w-16 h-16 bg-[#FFD200] rounded-3xl flex items-center justify-center shadow-2xl relative z-10"><i class="fas fa-wallet text-black text-2xl"></i></div>
                    </div>
                    
                    <div class="carousel-wrapper" ontouchstart="window.handleTouchStart(event)" ontouchend="window.handleTouchEnd(event)">
                        <div class="carousel-container" style="transform: translateX(-${state.carouselIndex * 25}%);">
                            <div class="carousel-item">
                                <div onclick="window.setModal('desglose_ventas')" class="bg-white rounded-[30px] p-6 shadow-lg border border-slate-100 flex justify-between items-center mr-2 cursor-pointer active:scale-95 transition-all">
                                    <div><p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Ventas Totales</p><h3 class="text-blue-600 text-2xl font-black mt-1">$ ${vTotales}</h3></div>
                                    <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-500"><i class="fas fa-chart-bar text-xl"></i></div>
                                </div>
                            </div>
                            <div class="carousel-item">
                                <div class="bg-white rounded-[30px] p-6 shadow-lg border border-slate-100 flex justify-between items-center mx-1">
                                    <div><p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Dinero en la Calle</p><h3 class="text-rose-600 text-2xl font-black mt-1">$ ${deudas}</h3></div>
                                    <div class="w-12 h-12 bg-rose-50 rounded-2xl flex items-center justify-center text-rose-500"><i class="fas fa-hand-holding-dollar text-xl"></i></div>
                                </div>
                            </div>
                            <div class="carousel-item">
                                <div class="bg-white rounded-[30px] p-6 shadow-lg border border-slate-100 flex justify-between items-center mx-1">
                                    <div><p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Gastos Totales</p><h3 class="text-orange-600 text-2xl font-black mt-1">$ ${gastos}</h3></div>
                                    <div class="w-12 h-12 bg-orange-50 rounded-2xl flex items-center justify-center text-orange-500"><i class="fas fa-receipt text-xl"></i></div>
                                </div>
                            </div>
                            <div class="carousel-item">
                                <div class="bg-white rounded-[30px] p-6 shadow-lg border border-slate-100 flex justify-between items-center ml-2">
                                    <div><p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Ganancia Real</p><h3 class="text-emerald-600 text-2xl font-black mt-1">$ ${ganancias}</h3></div>
                                    <div class="w-12 h-12 bg-emerald-50 rounded-2xl flex items-center justify-center text-emerald-500"><i class="fas fa-chart-line text-xl"></i></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <main class="p-6 grid grid-cols-3 gap-5 mt-4">
                    <div onclick="window.setModal('venta')" class="app-card"><i class="fas fa-cart-plus text-blue-500 text-2xl mb-3"></i><p class="text-[10px] font-extrabold uppercase">Venta</p></div>
                    <div onclick="window.setModal('inventario')" class="app-card"><i class="fas fa-box-open text-emerald-500 text-2xl mb-3"></i><p class="text-[10px] font-extrabold uppercase">Stock</p></div>
                    <div onclick="window.setModal('clientes')" class="app-card"><i class="fas fa-user-tag text-rose-500 text-2xl mb-3"></i><p class="text-[10px] font-extrabold uppercase">Clientes</p></div>
                    <div onclick="window.setModal('egresos')" class="app-card"><i class="fas fa-receipt text-orange-500 text-2xl mb-3"></i><p class="text-[10px] font-extrabold uppercase">Gastos</p></div>
                    <div onclick="window.setModal('historial')" class="app-card"><i class="fas fa-list-ul text-purple-500 text-2xl mb-3"></i><p class="text-[10px] font-extrabold uppercase">Historial</p></div>
                    <div onclick="window.setModal('deudas')" class="app-card"><i class="fas fa-money-bill-transfer text-amber-600 text-2xl mb-3"></i><p class="text-[10px] font-extrabold uppercase">Cobros</p></div>
                    ${isAdm ? `<div onclick="window.setModal('admin')" class="app-card bg-slate-900 border-none text-white col-span-3 aspect-auto py-5 flex-row gap-4"><i class="fas fa-user-shield text-[#FFD200] text-xl"></i><p class="text-[11px] font-black tracking-widest uppercase">Panel de Control</p></div>` : ''}
                </main>
                <nav class="nav-bar">
                    <div class="w-10 h-10 flex items-center justify-center rounded-full bg-white/10 text-[#FFD200]"><i class="fas fa-home text-xl"></i></div>
                    <div class="w-10 h-10 flex items-center justify-center text-white/40"><i class="fas fa-chart-pie text-xl"></i></div>
                    <div class="w-10 h-10 flex items-center justify-center text-white/40"><i class="fas fa-cog text-xl"></i></div>
                </nav>
            </div>
            ${state.activeModal ? renderModal() : ''}`;
        }

        const fetchData = (userId) => {
            unsubscribes.forEach(unsub => unsub());
            unsubscribes = [];
            const userPath = (col) => collection(db, 'artifacts', appId, 'users', userId, col);
            const publicPath = (col) => collection(db, 'artifacts', appId, 'public', 'data', col);
            unsubscribes.push(onSnapshot(userPath("items"), (snap) => { state.items = snap.docs.map(d => ({id: d.id, ...d.data()})); render(); }));
            unsubscribes.push(onSnapshot(userPath("clients"), (snap) => { state.clients = snap.docs.map(d => ({id: d.id, ...d.data()})); render(); }));
            unsubscribes.push(onSnapshot(userPath("sales"), (snap) => { state.sales = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => new Date(b.date) - new Date(a.date)); render(); }));
            unsubscribes.push(onSnapshot(userPath("expenses"), (snap) => { state.expenses = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => new Date(b.date) - new Date(a.date)); render(); }));
            unsubscribes.push(onSnapshot(publicPath("notifications"), (snap) => { state.notifications = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => new Date(b.date) - new Date(a.date)); render(); }));
            if(auth.currentUser.email.toLowerCase() === ADMIN_EMAIL) {
                unsubscribes.push(onSnapshot(collection(db, 'artifacts', appId, 'users'), (snap) => { state.allUsers = snap.docs.map(d => ({id: d.id, ...d.data()})); render(); }));
            }
        };

        function calcularCaja() {
            const v = (state.sales || []).filter(s => s.type === 'contado').reduce((acc, s) => acc + Number(s.total || 0), 0);
            const e = (state.expenses || []).reduce((acc, exp) => acc + Number(exp.amount || 0), 0);
            return (v - e).toLocaleString('en-US', { minimumFractionDigits: 2 });
        }
        function calcularDeudas() {
            return (state.clients || []).reduce((acc, client) => acc + Number(client.debt || 0), 0).toLocaleString('en-US', { minimumFractionDigits: 2 });
        }
        function calcularGastos() {
            return (state.expenses || []).reduce((acc, exp) => acc + Number(exp.amount || 0), 0).toLocaleString('en-US', { minimumFractionDigits: 2 });
        }
        function calcularGanancias() {
            const cobrosEfectivos = (state.sales || []).filter(s => s.type === 'contado');
            const ingresos = cobrosEfectivos.reduce((acc, s) => acc + Number(s.total || 0), 0);
            const costos = cobrosEfectivos.filter(s => s.itemId !== "ABONO").reduce((acc, s) => acc + Number(s.cost || 0), 0);
            const gastos = (state.expenses || []).reduce((acc, exp) => acc + Number(exp.amount || 0), 0);
            return (ingresos - costos - gastos).toLocaleString('en-US', { minimumFractionDigits: 2 });
        }
        function calcularVentasTotales() {
            return (state.sales || []).reduce((acc, s) => acc + Number(s.total || 0), 0).toLocaleString('en-US', { minimumFractionDigits: 2 });
        }

        window.setModal = (m) => { state.activeModal = m; render(); };
        window.logout = () => { signOut(auth).then(() => { location.reload(); }); };
        window.handleTouchStart = (e) => { window.touchStartX = e.changedTouches[0].screenX; };
        window.handleTouchEnd = (e) => {
            let touchEndX = e.changedTouches[0].screenX;
            if (window.touchStartX - touchEndX > 50) { if (state.carouselIndex < 3) state.carouselIndex++; }
            if (touchEndX - window.touchStartX > 50) { if (state.carouselIndex > 0) state.carouselIndex--; }
            render();
        };

        window.handleVenta = async () => {
            const itemId = document.getElementById('vItem').value;
            const qty = Number(document.getElementById('vQty').value);
            const type = document.getElementById('vType').value;
            const clientId = type === 'credito' ? document.getElementById('vClient').value : null;
            if(!itemId || qty <= 0) return alert("Datos inválidos");
            const item = state.items.find(i => i.id === itemId);
            if(item.stock < qty) return alert("Stock insuficiente");
            const total = item.price * qty;
            const totalCost = (item.cost || 0) * qty;
            try {
                const userRef = (col) => collection(db, 'artifacts', appId, 'users', auth.currentUser.uid, col);
                const docRef = (col, id) => doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, col, id);
                await addDoc(userRef("sales"), { itemId, itemName: item.name, qty, total, cost: totalCost, type, clientId, date: new Date().toISOString() });
                await updateDoc(docRef("items", itemId), { stock: increment(-qty) });
                if(type === 'credito' && clientId) await updateDoc(docRef("clients", clientId), { debt: increment(total) });
                state.activeModal = null;
                render();
            } catch (e) { alert("Error"); }
        };

        window.addItem = async () => {
            const name = document.getElementById('nItem').value.trim();
            const code = document.getElementById('nCode').value.trim();
            const cost = Number(document.getElementById('nCost').value);
            const price = Number(document.getElementById('nPrice').value);
            const stock = Number(document.getElementById('nStock').value);
            if(!name || price <= 0) return alert("Nombre y precio obligatorios");
            try {
                const existingItem = code ? state.items.find(i => i.code === code) : null;
                if (existingItem) {
                    const itemRef = doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, "items", existingItem.id);
                    await updateDoc(itemRef, { stock: increment(stock), cost: cost });
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'users', auth.currentUser.uid, "items"), { name, code, cost, price, stock });
                }
                state.activeModal = null;
            } catch (e) { alert("Error al guardar"); }
        };

        window.deleteItem = async (id) => { if(confirm("¿Eliminar producto?")) await deleteDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, "items", id)); };
        
        window.addClient = async () => {
            const name = document.getElementById('cn').
