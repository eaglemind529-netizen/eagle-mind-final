
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eagle Mind - Gestión Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        :root { --primary: #FFD200; --secondary: #000000; --bg: #F8F9FA; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: #1A1A1A; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .header-gradient { background: linear-gradient(135deg, #FFD200 0%, #F5C300 100%); border-radius: 0 0 40px 40px; box-shadow: 0 10px 30px rgba(245, 195, 0, 0.15); }
        .app-card { background: white; border-radius: 28px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(0,0,0,0.03); box-shadow: 0 10px 20px rgba(0,0,0,0.02); aspect-ratio: 1/1; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .app-card:active { transform: scale(0.92); background-color: #f0f0f0; }
        .nav-bar { position: fixed; bottom: 24px; left: 24px; right: 24px; height: 76px; background: #000; border-radius: 28px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: flex; align-items: flex-end; z-index: 2000; }
        .modal-content { background: white; width: 100%; border-radius: 40px 40px 0 0; padding: 32px 24px; max-height: 90vh; overflow-y: auto; padding-bottom: 60px; }
        .input-group { background: #F1F3F5; border-radius: 20px; padding: 16px 20px; margin-bottom: 16px; width: 100%; border: 2px solid transparent; font-size: 16px; font-weight: 500; transition: all 0.2s; }
        .input-group:focus { border-color: var(--primary); background: white; outline: none; box-shadow: 0 0 0 4px rgba(255, 210, 0, 0.1); }
        .btn-yellow { background: var(--primary); color: black; font-weight: 800; border-radius: 20px; padding: 18px; width: 100%; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 8px 20px rgba(255, 210, 0, 0.2); }
        .list-item { background: #F8F9FA; border-radius: 20px; padding: 16px; margin-bottom: 12px; border: 1px solid #EEF2F6; display: flex; justify-content: space-between; align-items: center; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        
        /* Ajuste del Carrusel para 4 items */
        .carousel-container { display: flex; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); width: 400%; }
        .carousel-item { width: 25%; flex-shrink: 0; }
        .carousel-wrapper { overflow: hidden; width: 100%; border-radius: 30px; }
        
        .notif-badge { position: absolute; top: -2px; right: -2px; width: 10px; height: 10px; background: #ef4444; border-radius: 50%; border: 2px solid #000; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, increment, setDoc, getDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = "eagle-mind-final";
        const ADMIN_EMAIL = "eaglemind529@gmail.com";

        let state = {
            user: null, userData: null, loading: true,
            items: [], sales: [], clients: [], expenses: [],
            allUsers: [], notifications: [],
            activeModal: null,
            carouselIndex: 0,
            editingClientId: null,
            payingClientId: null,
            editingSaleId: null,
            isSyncing: false
        };

        let unsubscribes = [];

        const fetchData = (userId) => {
            unsubscribes.forEach(unsub => unsub());
            unsubscribes = [];

            const userPath = (col) => collection(db, 'artifacts', appId, 'users', userId, col);
            const publicPath = (col) => collection(db, 'artifacts', appId, 'public', 'data', col);
            
            unsubscribes.push(onSnapshot(userPath("items"), (snap) => {
                state.items = snap.docs.map(d => ({id: d.id, ...d.data()}));
                render();
            }));

            unsubscribes.push(onSnapshot(userPath("clients"), (snap) => {
                state.clients = snap.docs.map(d => ({id: d.id, ...d.data()}));
                render();
            }));

            unsubscribes.push(onSnapshot(userPath("sales"), (snap) => {
                state.sales = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => new Date(b.date) - new Date(a.date));
                render();
            }));

            unsubscribes.push(onSnapshot(userPath("expenses"), (snap) => {
                state.expenses = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => new Date(b.date) - new Date(a.date));
                render();
            }));

            unsubscribes.push(onSnapshot(publicPath("notifications"), (snap) => {
                state.notifications = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => new Date(b.date) - new Date(a.date));
                render();
            }));
            
            if(auth.currentUser.email.toLowerCase() === ADMIN_EMAIL) {
                unsubscribes.push(onSnapshot(collection(db, 'artifacts', appId, 'users'), (snap) => {
                    state.allUsers = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    render();
                }));
            }
        };

        window.handleVenta = async () => {
            const itemId = document.getElementById('vItem').value;
            const qty = Number(document.getElementById('vQty').value);
            const type = document.getElementById('vType').value;
            const clientId = type === 'credito' ? document.getElementById('vClient').value : null;
            if(!itemId || qty <= 0) return alert("Datos inválidos");
            const item = state.items.find(i => i.id === itemId);
            if(item.stock < qty) return alert("Stock insuficiente");
            const total = item.price * qty;
            const totalCost = (item.cost || 0) * qty;

            try {
                const userRef = (col) => collection(db, 'artifacts', appId, 'users', auth.currentUser.uid, col);
                const docRef = (col, id) => doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, col, id);
                await addDoc(userRef("sales"), { 
                    itemId, 
                    itemName: item.name, 
                    qty, 
                    total, 
                    cost: totalCost, 
                    type, 
                    clientId, 
                    date: new Date().toISOString() 
                });
                await updateDoc(docRef("items", itemId), { stock: increment(-qty) });
                if(type === 'credito' && clientId) await updateDoc(docRef("clients", clientId), { debt: increment(total) });
                state.activeModal = null;
                render();
            } catch (e) { alert("Error"); }
        };

        window.addItem = async () => {
            const name = document.getElementById('nItem').value.trim();
            const code = document.getElementById('nCode').value.trim();
            const cost = Number(document.getElementById('nCost').value);
            const price = Number(document.getElementById('nPrice').value);
            const stock = Number(document.getElementById('nStock').value);
            if(!name || price <= 0) return alert("Nombre y precio obligatorios");
            try {
                const existingItem = code ? state.items.find(i => i.code === code) : null;
                if (existingItem) {
                    const itemRef = doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, "items", existingItem.id);
                    await updateDoc(itemRef, { stock: increment(stock), cost: cost });
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'users', auth.currentUser.uid, "items"), { name, code, cost, price, stock });
                }
                state.activeModal = null;
            } catch (e) { alert("Error al guardar el producto"); }
        };

        window.deleteItem = async (id) => {
            try { await deleteDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, "items", id)); } catch (e) { alert("Error al eliminar producto"); }
        };

        window.addClient = async () => {
            const name = document.getElementById('cn').value.trim();
            const code = document.getElementById('cc').value.trim();
            const phone = document.getElementById('cp').value.trim();
            if(!name || !code) return alert("Nombre y Código son obligatorios");
            const clientData = { name, code, phone };
            try {
                if(state.editingClientId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, "clients", state.editingClientId), clientData);
                    state.editingClientId = null;
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'users', auth.currentUser.uid, "clients"), { ...clientData, debt: 0 });
                }
                state.activeModal = null;
                render();
            } catch (e) { alert("Error al procesar cliente"); }
        };

        window.editClient = (id) => {
            const client = state.clients.find(c => c.id === id);
            if(client) {
                state.editingClientId = id;
                document.getElementById('cn').value = client.name;
                document.getElementById('cc').value = client.code;
                document.getElementById('cp').value = client.phone || '';
                document.getElementById('btnClientAction').innerText = "Actualizar Cliente";
            }
        };

        window.deleteClient = async (id) => {
            try { await deleteDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, "clients", id)); } catch (e) { alert("Error al eliminar"); }
        };

        window.addExpense = async () => {
            const desc = document.getElementById('eDesc').value.trim();
            const amount = Number(document.getElementById('eAmt').value);
            if(!desc || amount <= 0) return;
            await addDoc(collection(db, 'artifacts', appId, 'users', auth.currentUser.uid, "expenses"), { desc, amount, date: new Date().toISOString() });
            state.activeModal = null;
        };

        window.handleAbono = async (clientIdFromBtn) => {
            const targetId = clientIdFromBtn || state.payingClientId;
            const amountInput = document.getElementById(clientIdFromBtn ? `input-abono-${clientIdFromBtn}` : 'aAmt');
            if(!amountInput) return;
            const amount = parseFloat(amountInput.value);
            if(!amount || amount <= 0 || isNaN(amount)) return alert("Ingrese un monto válido");
            if(!targetId) return alert("Error de sesión de cobro");
            const client = state.clients.find(c => c.id === targetId);
            if(!client) return alert("Cliente no encontrado");
            if(amount > (client.debt + 0.01)) return alert("El abono no puede superar la deuda");
            try {
                const userPath = (col) => collection(db, 'artifacts', appId, 'users', auth.currentUser.uid, col);
                const docPath = (col, id) => doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, col, id);
                await updateDoc(docPath("clients", targetId), { debt: increment(-amount) });
                await addDoc(userPath("sales"), { itemId: "ABONO", itemName: `Abono: ${client.name}`, qty: 1, total: amount, cost: 0, type: 'contado', date: new Date().toISOString() });
                state.payingClientId = null;
                state.activeModal = null;
                render();
            } catch (e) { alert("Error al procesar abono"); }
        };

        window.editVenta = (id) => {
            state.editingSaleId = id;
            render();
        };

        window.saveEditedVenta = async (saleId) => {
            const sale = state.sales.find(s => s.id === saleId);
            const newQty = Number(document.getElementById('editVQty').value);
            const newTotal = Number(document.getElementById('editVTotal').value);
            const newUnitCost = Number(document.getElementById('editVCost').value);
            if(!newQty || newQty < 0) return alert("Cantidad inválida");
            try {
                const userDocPath = (col, id) => doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, col, id);
                if(newQty !== sale.qty && sale.itemId !== "ABONO") {
                    const diff = sale.qty - newQty; 
                    await updateDoc(userDocPath("items", sale.itemId), { stock: increment(diff) });
                }
                if(sale.type === 'credito' && sale.clientId && newTotal !== sale.total) {
                    const diffDeuda = newTotal - sale.total;
                    await updateDoc(userDocPath("clients", sale.clientId), { debt: increment(diffDeuda) });
                }
                const updatedData = { qty: newQty, total: newTotal, cost: newUnitCost * newQty };
                await updateDoc(userDocPath("sales", saleId), updatedData);
                state.editingSaleId = null;
                render();
            } catch (e) { alert("Error al actualizar venta"); }
        };

        window.sincronizarCostos = async () => {
            if (state.isSyncing) return;
            state.isSyncing = true;
            render();
            try {
                const batch = writeBatch(db);
                let count = 0;
                for (const sale of state.sales) {
                    if (sale.itemId && sale.itemId !== "ABONO") {
                        const currentItem = state.items.find(i => i.id === sale.itemId);
                        if (currentItem && (currentItem.cost || currentItem.cost === 0)) {
                            const saleCost = sale.cost || 0;
                            const targetCost = Number(currentItem.cost) * Number(sale.qty);
                            if (saleCost === 0 && targetCost > 0) {
                                const saleRef = doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, "sales", sale.id);
                                batch.update(saleRef, { cost: targetCost });
                                count++;
                            }
                        }
                    }
                }
                if (count > 0) await batch.commit();
            } catch (e) { console.error(e); } finally { state.isSyncing = false; render(); }
        };

        window.sendNotification = async () => {
            const title = document.getElementById('notifTitle').value.trim();
            const msg = document.getElementById('notifMsg').value.trim();
            if(!title || !msg) return alert("Complete los campos");
            try {
                const publicPath = collection(db, 'artifacts', appId, 'public', 'data', 'notifications');
                await addDoc(publicPath, { title, message: msg, date: new Date().toISOString() });
                alert("Notificación enviada");
                document.getElementById('notifTitle').value = "";
                document.getElementById('notifMsg').value = "";
            } catch (e) { alert("Error al enviar"); }
        };

        window.deleteNotification = async (id) => {
            try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'notifications', id)); } catch (e) { alert("Error al eliminar"); }
        };

        window.toggleUserStatus = async (uid, currentStatus) => {
            await updateDoc(doc(db, 'artifacts', appId, 'users', uid), { approved: !currentStatus });
        };

        window.logout = () => {
            signOut(auth).then(() => {
                state.user = null;
                state.userData = null;
                state.loading = false;
                render();
                location.reload();
            });
        };

        window.setModal = (m) => { 
            state.activeModal = m; 
            if(m !== 'clientes') state.editingClientId = null;
            if(m !== 'deudas') state.payingClientId = null;
            if(m !== 'historial') state.editingSaleId = null;
            render(); 
        };

        function calcularCaja() {
            const v = state.sales.filter(s => s.type === 'contado').reduce((acc, s) => acc + Number(s.total), 0);
            const e = state.expenses.reduce((acc, exp) => acc + Number(exp.amount), 0);
            return (v - e).toLocaleString('en-US', { minimumFractionDigits: 2 });
        }

        function calcularDeudas() {
            return state.clients.reduce((acc, client) => acc + Number(client.debt || 0), 0).toLocaleString('en-US', { minimumFractionDigits: 2 });
        }

        function calcularGastos() {
            return state.expenses.reduce((acc, exp) => acc + Number(exp.amount), 0).toLocaleString('en-US', { minimumFractionDigits: 2 });
        }

        function calcularGanancias() {
            const cobrosEfectivos = state.sales.filter(s => s.type === 'contado');
            const ingresosCobrados = cobrosEfectivos.reduce((acc, s) => acc + Number(s.total), 0);
            const costosProductosCobrados = cobrosEfectivos
                .filter(s => s.itemId !== "ABONO")
                .reduce((acc, s) => acc + Number(s.cost || 0), 0);
            const gastosOperativos = state.expenses.reduce((acc, exp) => acc + Number(exp.amount), 0);
            const gananciaNeta = (ingresosCobrados - costosProductosCobrados) - gastosOperativos;
            return gananciaNeta.toLocaleString('en-US', { minimumFractionDigits: 2 });
        }

        // Nueva función para Ventas Totales
        function calcularVentasTotales() {
            const total = state.sales.reduce((acc, s) => acc + Number(s.total), 0);
            return total.toLocaleString('en-US', { minimumFractionDigits: 2 });
        }

        let touchStartX = 0;
        window.handleTouchStart = (e) => { touchStartX = e.changedTouches[0].screenX; };
        window.handleTouchEnd = (e) => {
            let touchEndX = e.changedTouches[0].screenX;
            if (touchStartX - touchEndX > 50) {
                if (state.carouselIndex < 3) state.carouselIndex++;
            }
            if (touchEndX - touchStartX > 50) {
                if (state.carouselIndex > 0) state.carouselIndex--;
            }
            render();
        };

        function rend
