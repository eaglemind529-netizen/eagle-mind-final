<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eagle Mind System</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap');
        h1, h2, button { font-family: 'Archivo Black', sans-serif; }
    </style>
</head>
<body class="bg-[#06080c] text-white">
    <div id="raiz"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AQUÍ_PEGA_TU_LLAVE_AIza", // <-- PASO FINAL: PEGA TU LLAVE AQUÍ
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.appspot.com",
            messagingSenderId: "374528148386",
            appId: "1:374528148386:web:8655e69e802058309e309d"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.auth = getAuth(app);
        window.firebaseLogin = { signInWithEmailAndPassword, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');

            useEffect(() => {
                const unsub = window.firebaseLogin.onAuthStateChanged(window.auth, (u) => setUser(u));
                return () => unsub();
            }, []);

            const entrar = async (e) => {
                e.preventDefault();
                try {
                    await window.firebaseLogin.signInWithEmailAndPassword(window.auth, email, password);
                } catch (err) {
                    alert("Error: Revisa tus datos en Firebase");
                }
            };

            if (!user) return (
                <div className="h-screen flex items-center justify-center p-6">
                    <div className="bg-[#0a0f18] p-10 rounded-[3rem] border border-white/5 w-full max-w-md text-center">
                        <h2 className="text-3xl text-orange-500 mb-8 uppercase italic font-black">Eagle Mind</h2>
                        <form onSubmit={entrar} className="space-y-4">
                            <input type="email" placeholder="Correo" className="w-full bg-black/40 border border-white/10 p-4 rounded-2xl outline-none" onChange={e => setEmail(e.target.value)} />
                            <input type="password" placeholder="Clave" className="w-full bg-black/40 border border-white/10 p-4 rounded-2xl outline-none" onChange={e => setPassword(e.target.value)} />
                            <button type="submit" className="w-full bg-orange-500 text-black font-black py-4 rounded-2xl uppercase shadow-lg">Entrar</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="h-screen flex flex-col items-center justify-center">
                    <h1 className="text-5xl font-black italic text-orange-500 uppercase">¡Sistema Online!</h1>
                    <p className="mt-4 opacity-50 uppercase tracking-widest font-bold">Bienvenido: {user.email}</p>
                </div>
            );
        }

        const raiz = ReactDOM.createRoot(document.getElementById('raiz'));
        raiz.render(<App />);
    </script>
</body>
</html>
