<body>
    <div id="app"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, increment, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = "eagle-mind-final";
        const ADMIN_EMAIL = "eaglemind529@gmail.com";

        let state = {
            user: null, userData: null, loading: true,
            items: [], sales: [], clients: [], expenses: [],
            allUsers: [], activeModal: null
        };

        let unsubscribes = [];

        const fetchData = (userId) => {
            unsubscribes.forEach(unsub => unsub());
            unsubscribes = [];

            const userPath = (col) => collection(db, 'artifacts', appId, 'users', userId, col);
            
            // Listener de Items
            unsubscribes.push(onSnapshot(userPath("items"), (snap) => {
                state.items = snap.docs.map(d => ({id: d.id, ...d.data()}));
                render();
            }, (err) => console.log("Error items:", err)));

            // Listener de Clientes
            unsubscribes.push(onSnapshot(userPath("clients"), (snap) => {
                state.clients = snap.docs.map(d => ({id: d.id, ...d.data()}));
                render();
            }));

            // Listener de Ventas
            unsubscribes.push(onSnapshot(userPath("sales"), (snap) => {
                state.sales = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => new Date(b.date) - new Date(a.date));
                render();
            }));

            // Listener de Gastos
            unsubscribes.push(onSnapshot(userPath("expenses"), (snap) => {
                state.expenses = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => new Date(b.date) - new Date(a.date));
                render();
            }));
            
            if(auth.currentUser.email.toLowerCase() === ADMIN_EMAIL) {
                unsubscribes.push(onSnapshot(collection(db, 'artifacts', appId, 'users'), (snap) => {
                    state.allUsers = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    render();
                }));
            }
        };

        // Acciones Globales
        window.handleVenta = async () => {
            const itemId = document.getElementById('vItem').value;
            const qty = Number(document.getElementById('vQty').value);
            const type = document.getElementById('vType').value;
            const clientId = type === 'credito' ? document.getElementById('vClient').value : null;
            if(!itemId || qty <= 0) return alert("Datos inválidos");
            const item = state.items.find(i => i.id === itemId);
            if(item.stock < qty) return alert("Stock insuficiente");
            const total = item.price * qty;
            try {
                const userRef = (col) => collection(db, 'artifacts', appId, 'users', auth.currentUser.uid, col);
                const docRef = (col, id) => doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, col, id);
                await addDoc(userRef("sales"), { itemId, itemName: item.name, qty, total, type, clientId, date: new Date().toISOString() });
                await updateDoc(docRef("items", itemId), { stock: increment(-qty) });
                if(type === 'credito' && clientId) await updateDoc(docRef("clients", clientId), { debt: increment(total) });
                state.activeModal = null;
                render();
            } catch (e) { alert("Error"); }
        };

        window.addItem = async () => {
            const name = document.getElementById('nItem').value.trim();
            const price = Number(document.getElementById('nPrice').value);
            const stock = Number(document.getElementById('nStock').value);
            if(!name || price <= 0) return alert("Datos incompletos");
            await addDoc(collection(db, 'artifacts', appId, 'users', auth.currentUser.uid, "items"), { name, price, stock });
            state.activeModal = null;
        };

        window.addClient = async () => {
            const name = document.getElementById('cn').value.trim();
            if(!name) return;
            await addDoc(collection(db, 'artifacts', appId, 'users', auth.currentUser.uid, "clients"), { name, debt: 0 });
            state.activeModal = null;
        };

        window.addExpense = async () => {
            const desc = document.getElementById('eDesc').value.trim();
            const amount = Number(document.getElementById('eAmt').value);
            if(!desc || amount <= 0) return;
            await addDoc(collection(db, 'artifacts', appId, 'users', auth.currentUser.uid, "expenses"), { desc, amount, date: new Date().toISOString() });
            state.activeModal = null;
        };

        window.toggleUserStatus = async (uid, currentStatus) => {
            await updateDoc(doc(db, 'artifacts', appId, 'users', uid), { approved: !currentStatus });
        };

        window.logout = () => {
            signOut(auth).then(() => {
                state.user = null;
                state.userData = null;
                state.loading = false;
                render();
                location.reload(); // Recarga limpia
            });
        };

        window.setModal = (m) => { state.activeModal = m; render(); };

        function calcularCaja() {
            const v = state.sales.filter(s => s.type === 'contado').reduce((acc, s) => acc + Number(s.total), 0);
            const e = state.expenses.reduce((acc, exp) => acc + Number(exp.amount), 0);
            return (v - e).toLocaleString('en-US', { minimumFractionDigits: 2 });
        }

        function calcularDeudas() {
            const totalDeudas = state.clients.reduce((acc, client) => acc + Number(client.debt || 0), 0);
            return totalDeudas.toLocaleString('en-US', { minimumFractionDigits: 2 });
        }

        function render() {
            const root = document.getElementById('app');
            if (state.loading) {
                root.innerHTML = `<div class="h-screen flex items-center justify-center bg-white"><div class="flex flex-col items-center"><div class="animate-spin rounded-full h-12 w-12 border-t-4 border-yellow-500 mb-4"></div><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Sincronizando...</p></div></div>`;
                return;
            }
            if (!state.user) { renderLogin(root); return; }
            const isAdm = state.user.email.toLowerCase() === ADMIN_EMAIL;
            if (state.userData && !state.userData.approved && !isAdm) {
                root.innerHTML = `<div class="h-screen flex flex-col items-center justify-center px-10 text-center bg-white"><div class="w-24 h-24 bg-amber-50 rounded-full flex items-center justify-center mb-8"><i class="fas fa-lock text-amber-500 text-4xl"></i></div><h2 class="text-3xl font-black mb-4 uppercase tracking-tighter">Acceso Pendiente</h2><p class="text-slate-400 text-base leading-relaxed">Tu cuenta <b>${state.user.email}</b> espera aprobación.</p><button onclick="window.logout()" class="btn-yellow mt-10">Cerrar Sesión</button></div>`;
                return;
            }
            const caja = calcularCaja();
            const deudas = calcularDeudas();

            root.innerHTML = `
            <div class="pb-36">
                <header class="header-gradient pt-16 pb-12 px-8 flex justify-between items-end">
                    <div><h2 class="text-black font-black text-3xl uppercase tracking-tighter">EXITO</h2><p class="text-black/50 text-[11px] font-bold tracking-widest uppercase mt-2">Gestión Privada</p></div>
                    <button onclick="window.logout()" class="w-14 h-14 bg-black rounded-2xl flex items-center justify-center shadow-lg"><i class="fas fa-power-off text-white text-lg"></i></button>
                </header>
                <div class="px-6 -mt-10 flex flex-col gap-4">
                    <div class="bg-black rounded-[35px] p-8 shadow-2xl flex justify-between items-center text-white relative overflow-hidden">
                        <div class="relative z-10"><p class="text-white/40 text-[11px] font-bold uppercase tracking-widest">En Caja (Efectivo)</p><h3 class="text-white text-3xl font-black mt-2 tracking-tighter">$ ${caja}</h3></div>
                        <div class="w-16 h-16 bg-[#FFD200] rounded-3xl flex items-center justify-center shadow-2xl relative z-10"><i class="fas fa-wallet text-black text-2xl"></i></div>
                    </div>
                    
                    <div class="bg-white rounded-[30px] p-6 shadow-lg border border-slate-100 flex justify-between items-center">
                        <div>
                            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Dinero en la Calle (Créditos)</p>
                            <h3 class="text-rose-600 text-2xl font-black mt-1">$ ${deudas}</h3>
                        </div>
                        <div class="w-12 h-12 bg-rose-50 rounded-2xl flex items-center justify-center text-rose-500"><i class="fas fa-hand-holding-dollar text-xl"></i></div>
                    </div>
                </div>
                <main class="p-6 grid grid-cols-3 gap-5 mt-4">
                    <div onclick="window.setModal('venta')" class="app-card"><i class="fas fa-cart-plus text-blue-500 text-2xl mb-3"></i><p class="text-[10px] font-extrabold uppercase">Venta</p></div>
                    <div onclick="window.setModal('inventario')" class="app-card"><i class="fas fa-box-open text-emerald-500 text-2xl mb-3"></i><p class="text-[10px] font-extrabold uppercase">Stock</p></div>
                    <div onclick="window.setModal('clientes')" class="app-card"><i class="fas fa-user-tag text-rose-500 text-2xl mb-3"></i><p class="text-[10px] font-extrabold uppercase">Clientes</p></div>
                    <div onclick="window.setModal('egresos')" class="app-card"><i class="fas fa-receipt text-orange-500 text-2xl mb-3"></i><p class="text-[10px] font-extrabold uppercase">Gastos</p></div>
                    <div onclick="window.setModal('historial')" class="app-card"><i class="fas fa-list-ul text-purple-500 text-2xl mb-3"></i><p class="text-[10px] font-extrabold uppercase">Historial</p></div>
                    <div onclick="window.setModal('deudas')" class="app-card"><i class="fas fa-money-bill-transfer text-amber-600 text-2xl mb-3"></i><p class="text-[10px] font-extrabold uppercase">Cobros</p></div>
                    ${isAdm ? `<div onclick="window.setModal('admin')" class="app-card bg-slate-900 border-none text-white col-span-3 aspect-auto py-5 flex-row gap-4"><i class="fas fa-user-shield text-[#FFD200] text-xl"></i><p class="text-[11px] font-black tracking-widest uppercase">Panel de Accesos</p></div>` : ''}
                </main>
                <nav class="nav-bar">
                    <div class="w-10 h-10 flex items-center justify-center rounded-full bg-white/10 text-[#FFD200]"><i class="fas fa-home text-xl"></i></div>
                    <div class="w-10 h-10 flex items-center justify-center text-white/40"><i class="fas fa-chart-pie text-xl"></i></div>
                    <div class="w-10 h-10 flex items-center justify-center text-white/40"><i class="fas fa-cog text-xl"></i></div>
                </nav>
            </div>
            ${state.activeModal ? renderModal() : ''}`;
        }

        function renderModal() {
            const m = state.activeModal;
            let html = '';
            if(m === 'venta') {
                html = `<h2 class="text-2xl font-black mb-6 uppercase tracking-tighter">Nueva Venta</h2><select id="vItem" class="input-group">${state.items.map(i => `<option value="${i.id}">${i.name} ($${i.price})</option>`)}</select><input id="vQty" type="number" class="input-group" value="1"><select id="vType" class="input-group" onchange="document.getElementById('divClient').style.display = this.value === 'credito' ? 'block' : 'none'"><option value="contado">💵 Efectivo</option><option value="credito">⏳ Crédito</option></select><div id="divClient" style="display:none"><select id="vClient" class="input-group">${state.clients.map(c => `<option value="${c.id}">${c.name}</option>`)}</select></div><button onclick="window.handleVenta()" class="btn-yellow mt-4">Confirmar</button>`;
            } else if(m === 'inventario') {
                html = `<h2 class="text-2xl font-black mb-6 uppercase tracking-tighter">Stock</h2><div class="space-y-3 mb-8 max-h-40 overflow-y-auto">${state.items.map(i => `<div class="list-item"><b>${i.name}</b><span class="font-black text-emerald-600">${i.stock} ud</span></div>`).join('')}</div><input id="nItem" type="text" placeholder="Producto" class="input-group"><input id="nPrice" type="number" placeholder="Precio" class="input-group"><input id="nStock" type="number" placeholder="Stock Inicial" class="input-group"><button onclick="window.addItem()" class="btn-yellow">Añadir</button>`;
            } else if(m === 'admin') {
                html = `<h2 class="text-2xl font-black mb-6 uppercase tracking-tighter">Accesos</h2><div class="space-y-3">${state.allUsers.map(u => `<div class="list-item"><div><p class="text-xs font-black">${u.email}</p><p class="text-[9px] font-bold ${u.approved ? 'text-emerald-500' : 'text-amber-500'} uppercase">${u.approved ? 'Autorizado' : 'Pendiente'}</p></div><button onclick="window.toggleUserStatus('${u.id}', ${u.approved})" class="px-4 py-2 ${u.approved ? 'bg-rose-50 text-rose-600' : 'bg-emerald-50 text-emerald-600'} rounded-xl text-[10px] font-black uppercase">${u.approved ? 'Bloquear' : 'Aprobar'}</button></div>`).join('')}</div>`;
            } else if(m === 'clientes') {
                html = `<h2 class="text-2xl font-black mb-6 uppercase tracking-tighter">Clientes</h2><div class="space-y-3 mb-6">${state.clients.map(c => `<div class="list-item"><span>${c.name}</span><span class="text-rose-600 font-black">$${c.debt.toFixed(2)}</span></div>`).join('')}</div><input id="cn" type="text" placeholder="Nuevo Cliente" class="input-group"><button onclick="window.addClient()" class="btn-yellow">Registrar</button>`;
            } else if(m === 'egresos') {
                html = `<h2 class="text-2xl font-black mb-6 uppercase tracking-tighter">Gasto</h2><input id="eDesc" type="text" placeholder="Concepto" class="input-group"><input id="eAmt" type="number" placeholder="Monto" class="input-group"><button onclick="window.addExpense()" class="btn-yellow">Guardar</button>`;
            } else if(m === 'historial') {
                html = `<h2 class="text-2xl font-black mb-6 uppercase tracking-tighter">Ventas</h2><div class="space-y-3 max-h-80 overflow-y-auto">${state.sales.map(s => `<div class="list-item"><div><p class="text-sm font-bold">${s.itemName}</p><p class="text-[9px] text-slate-400 font-bold uppercase">${new Date(s.date).toLocaleDateString()}</p></div><span class="text-emerald-600 font-black">$${s.total.toFixed(2)}</span></div>`).join('')}</div>`;
            } else if(m === 'deudas') {
                html = `<h2 class="text-2xl font-black mb-6 uppercase tracking-tighter">Cobros</h2><div class="space-y-3">${state.clients.filter(c => c.debt > 0).map(c => `<div class="list-item"><span>${c.name}</span><span class="text-rose-600 font-black">$${c.debt.toFixed(2)}</span></div>`).join('')}</div>`;
            }
            return `<div class="modal" onclick="if(event.target === this) window.setModal(null)"><div class="modal-content animate-slide-up"><div class="w-16 h-1.5 bg-slate-200 rounded-full mx-auto mb-8" onclick="window.setModal(null)"></div>${html}<button onclick="window.setModal(null)" class="w-full mt-8 text-slate-300 font-black uppercase text-[11px] tracking-widest">Cerrar</button></div></div>`;
        }

        function renderLogin(root) {
            root.innerHTML = `<div class="h-screen flex flex-col justify-center px-10 bg-white"><div class="w-24 h-24 header-gradient rounded-[32px] mx-auto mb-8 flex items-center justify-center shadow-2xl rotate-3"><i class="fas fa-eagle text-black text-4xl"></i></div><h1 class="text-4xl font-black text-center mb-2 tracking-tighter italic">Eagle Mind</h1><p class="text-center text-slate-400 text-[11px] font-bold uppercase tracking-[0.3em] mb-12">Private Edition Pro</p><input id="email" type="email" placeholder="Correo electrónico" class="input-group"><input id="pass" type="password" placeholder="Contraseña" class="input-group"><button id="btnLogin" onclick="window.handleLogin()" class="btn-yellow mt-6">Acceder</button><div class="relative flex py-10 items-center"><div class="flex-grow border-t border-slate-100"></div><span class="mx-4 text-slate-300 text-[10px] font-bold uppercase">Registro</span><div class="flex-grow border-t border-slate-100"></div></div><button id="btnReg" onclick="window.handleRegister()" class="w-full py-5 border-2 border-slate-100 rounded-[22px] text-slate-400 font-black text-[11px] uppercase active:bg-slate-50">Solicitar Acceso</button></div>`;
        }

        window.handleLogin = async () => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('pass').value;
            if(!email || !pass) return;
            document.getElementById('btnLogin').innerText = "ENTRANDO...";
            try { await signInWithEmailAndPassword(auth, email, pass); } catch(err) { alert("Error de acceso"); document.getElementById('btnLogin').innerText = "ACCEDER"; }
        };

        window.handleRegister = async () => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('pass').value;
            if(!email || pass.length < 6) return alert("Datos insuficientes");
            document.getElementById('btnReg').innerText = "REGISTRANDO...";
            try { 
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                const isAdm = email.toLowerCase() === ADMIN_EMAIL;
                await setDoc(doc(db, 'artifacts', appId, 'users', res.user.uid), { email, approved: isAdm });
                alert(isAdm ? "Admin Creado" : "Solicitud enviada");
            } catch(err) { alert("Error"); document.getElementById('btnReg').innerText = "SOLICITAR ACCESO"; }
        };

        onAuthStateChanged(auth, async (u) => { 
            state.user = u; 
            if(u) {
                const userDoc = await getDoc(doc(db, 'artifacts', appId, 'users', u.uid));
                state.userData = userDoc.exists() ? userDoc.data() : null;
                fetchData(u.uid);
            }
            state.loading = false; 
            render(); 
        });
    </script>
</body>
</html>
