<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eagle Mind System</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap');
        h1, h2, button { font-family: 'Archivo Black', sans-serif; }
        body { background-color: #06080c; color: white; margin: 0; }
    </style>
</head>
<body>
    <div id="raiz"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // DATOS EXTRAÍDOS DE TU CAPTURA DE PANTALLA
        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.appspot.com",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.auth = getAuth(app);
        window.fb = { signInWithEmailAndPassword, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');

            useEffect(() => {
                const unsub = window.fb.onAuthStateChanged(window.auth, (u) => setUser(u));
                return () => unsub();
            }, []);

            const entrar = async (e) => {
                e.preventDefault();
                try {
                    await window.fb.signInWithEmailAndPassword(window.auth, email, password);
                } catch (err) {
                    alert("¡Atención! Verifica que el usuario " + email + " esté creado en la sección Authentication de Firebase.");
                }
            };

            if (!user) return (
                <div className="h-screen flex items-center justify-center p-6">
                    <div className="bg-[#0a0f18] p-10 rounded-[3rem] border border-white/5 w-full max-w-md shadow-2xl">
                        <h2 className="text-3xl text-orange-500 text-center mb-8 uppercase italic font-black">Eagle Mind</h2>
                        <form onSubmit={entrar} className="space-y-4">
                            <input 
                                type="email" 
                                placeholder="Tu Correo" 
                                className="w-full bg-black/40 border border-white/10 p-4 rounded-2xl outline-none text-center"
                                onChange={e => setEmail(e.target.value)}
                            />
                            <input 
                                type="password" 
                                placeholder="Contraseña" 
                                className="w-full bg-black/40 border border-white/10 p-4 rounded-2xl outline-none text-center"
                                onChange={e => setPassword(e.target.value)}
                            />
                            <button type="submit" className="w-full bg-orange-500 text-black font-black py-4 rounded-2xl uppercase hover:scale-95 transition-transform">
                                ENTRAR AL SISTEMA
                            </button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="h-screen flex flex-col items-center justify-center text-center">
                    <h1 className="text-6xl font-black italic uppercase text-orange-500">Conectado</h1>
                    <p className="mt-4 uppercase tracking-[0.3em] font-bold opacity-50">Bienvenido: {user.email}</p>
                    <div className="mt-10 p-6 bg-white/5 rounded-3xl border border-white/10">
                        <p>El sistema está listo para procesar tus datos.</p>
                    </div>
                </div>
            );
        }

        const raiz = ReactDOM.createRoot(document.getElementById('raiz'));
        raiz.render(<App />);
    </script>
</body>
</html>
