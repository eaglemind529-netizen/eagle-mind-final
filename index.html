    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [loading, setLoading] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isRegistering, setIsRegistering] = useState(false);

            useEffect(() => {
                const init = () => {
                    if (window.fb && window.auth) {
                        return window.fb.onAuthStateChanged(window.auth, (u) => {
                            setUser(u);
                            setLoading(false);
                        });
                    }
                    setTimeout(init, 200);
                };
                init();
            }, []);

            const handleAuth = async (e) => {
                e.preventDefault();
                try {
                    if (isRegistering) await window.fb.createUserWithEmailAndPassword(window.auth, email, password);
                    else await window.fb.signInWithEmailAndPassword(window.auth, email, password);
                } catch (err) { alert("Error: " + err.message); }
            };

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-white font-bold">
                    <div className="text-center">
                        <div className="w-12 h-12 border-4 border-[#FFD200] border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                        <p>Cargando Eagle Mind...</p>
                    </div>
                </div>
            );

            if (!user) return (
                <div className="h-screen bg-white p-10 flex flex-col justify-center">
                    <div className="text-center mb-12">
                        <div className="w-20 h-20 header-yellow rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-yellow-200">

                        </div>
                        <h1 className="text-3xl font-extrabold text-slate-900 tracking-tight">Eagle Mind</h1>
                        <p className="text-slate-400 mt-2 font-medium">Gestiona tu éxito</p>
                    </div>
                    <form onSubmit={handleAuth} className="space-y-4">
                        <input type="email" placeholder="Correo" className="w-full bg-slate-50 border-none p-4 rounded-2xl outline-none" value={email} onChange={e => setEmail(e.target.value)} required />
                        <input type="password" placeholder="Contraseña" className="w-full bg-slate-50 border-none p-4 rounded-2xl outline-none" value={password} onChange={e => setPassword(e.target.value)} required />
                        <div className="flex gap-2 pt-4">
                            <button type="submit" onClick={() => setIsRegistering(false)} className="flex-1 bg-black text-[#FFD200] font-bold py-4 rounded-2xl">Entrar</button>
                            <button type="submit" onClick={() => setIsRegistering(true)} className="flex-1 bg-slate-100 text-black font-bold py-4 rounded-2xl">Unirse</button>
                        </div>
                    </form>
                </div>
            );

            return (

                                <div className="w-11 h-11 bg-white rounded-2xl flex items-center justify-center shadow-sm">
                                    <i className="fas fa-user text-black text-sm"></i>
                                </div>

                                    <h2 className="text-black font-extrabold text-lg leading-none truncate w-32">{user.email.split('@')[0]}</h2>

                                </div>
                            </div>
                            <button onClick={() => window.fb.signOut(window.auth)} className="w-10 h-10 bg-black/5 rounded-xl flex items-center justify-center">
                                <i className="fas fa-sign-out-alt text-black text-sm"></i>
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto px-6 py-6 pb-28 hide-scrollbar animate-fade">
                        {view === 'dashboard' && <DashboardGrid setView={setView} />}
                        {view === 'clientes' && <ClientesView userId={user.uid} />}
                        {view === 'ventas' && <VentasView userId={user.uid} />}
                        {view === 'estadisticas' && <EstadisticasView userId={user.uid} />}
                        {view === 'inventory' && <InventoryView userId={user.uid} />}
                        {view === 'egresos' && <EgresosView userId={user.uid} />}
                        {view === 'creditos' && <CreditosView userId={user.uid} />}
                    </main>

                        <NavButton active={view === 'ventas'} icon="fa-cart-shopping" label="Ventas" onClick={() => setView('ventas')} />
                        <NavButton active={view === 'estadisticas'} icon="fa-chart-pie" label="Stats" onClick={() => setView('estadisticas')} />
                        <NavButton active={view === 'inventory'} icon="fa-box-archive" label="Stock" onClick={() => setView('inventory')} />
                    </nav>
                </div>
            );

        function NavButton({ icon, label, active, onClick }) {
            return (

                    <span className="text-[9px] font-extrabold uppercase">{label}</span>
                </button>

        function DashboardGrid({ setView }) {
            return (

        function GridItem({ icon, label, color, text, onClick }) {

        }

        function ClientesView({ userId }) {
            const [clientes, setClientes] = useState([]);
            const [form, setForm] = useState({ codigo: '', nombre: '', telefono: '' });
            const path = `/artifacts/${window.appId}/users/${userId}/clientes`;

            useEffect(() => {

            }, [userId]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                await window.fb.addDoc(window.fb.collection(window.db, path), form);
                setForm({ codigo: '', nombre: '', telefono: '' });
            };

            return (
                <div>
                    <h2 className="text-2xl font-black mb-6">Clientes</h2>

                        <input placeholder="Cód. Cliente" className="w-full bg-slate-50 p-4 rounded-xl outline-none" value={form.codigo} onChange={e => setForm({...form, codigo: e.target.value})} required />

                        <button className="w-full bg-black text-[#FFD200] font-bold py-4 rounded-xl">Crear Cliente</button>
                    </form>
                    <div className="space-y-3">
                        {clientes.map(c => (
                            <div key={c.id} className="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
                                <div><p className="font-bold">{c.nombre}</p><p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Cód: {c.codigo}</p></div>
                                <i className="fas fa-chevron-right text-slate-200"></i>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function InventoryView({ userId }) {
            const [products, setProducts] = useState([]);

            const path = `/artifacts/${window.appId}/users/${userId}/inventario`;

            const handleSubmit = async (e) => {
                e.preventDefault();
                await window.fb.addDoc(window.fb.collection(window.db, path), { ...form, precio: parseFloat(form.precio), stock: parseInt(form.stock) });
                setForm({ nombre: '', precio: '', stock: '' });
            };

            return (

                        <input type="number" placeholder="Precio Venta" className="w-full bg-slate-50 p-4 rounded-xl outline-none" value={form.precio} onChange={e => setForm({...form, precio: e.target.value})} required />
                        <input type="number" placeholder="Stock Inicial" className="w-full bg-slate-50 p-4 rounded-xl outline-none" value={form.stock} onChange={e => setForm({...form, stock: e.target.value})} required />
                        <button className="w-full bg-black text-[#FFD200] font-bold py-4 rounded-xl">Agregar Stock</button>
                    </form>
                    <div className="space-y-3">
                        {products.map(p => (

                                <p className="font-extrabold text-emerald-600">${p.precio}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }
